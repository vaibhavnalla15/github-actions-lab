name: Level 3 Env & Secrets

on:
  workflow_dispatch:
    
jobs:
  env-secrets-demo: 
    runs-on: ubuntu-24.04

    env:
      APP_ENV: production   # Non-sensitive

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Print Environment
        run: echo "Environment is $APP_ENV"

      - name: Use Secrete
        run: echo "Using secrete safely"
        env:
          API_KEY: ${{ secrets.API_KEY }} 

      - name: Simulate API Call
        run: |
          echo "Calling API with key..."
          echo "Key lengeth ${#API_KEY}"
        env:  
          API_KEY: ${{ secrets.API_KEY }}

      