name: Python Practice CI

on:
  push:
    branches: [ main ]
    paths:
      - 'python-practice/**'

jobs:
  run-python:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: python-practice

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Script 1
        run: python script1.py

      - name: Run Script 2
        run: python script2.py
        
      - name: Run Script 3
        run: python script3.py

      - name: Run Script with ENV
        run: python script4.py
        env:
          APP_ENV: production

      - name: Run Script 5
        run: python script5.py

      - name: Run Script 6
        run: python script6.py
      
      - name: Run Script 7
        run: python script7.py
        env:
          API_KEY: API7890
        
      - name: Run Script 8
        run: python script8.py
        env:
          API_KEY: API7890
        

