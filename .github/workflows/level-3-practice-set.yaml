name: Level 3 Practice Set

on:
  workflow_dispatch: 

jobs:
  practice:
    runs-on: ubuntu-latest

    env:
      APP_ENV: production
      APP_NAME: MyApp
    
    steps:
      - uses: actions/checkout@v3

      - name: Print App Name
        run: echo "App name is $APP_NAME"

      - name: Use secrte
        run: echo "Using DB password safely"
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Use Both
        run: echo "$APP_NAME is running in $APP_ENV environment"
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Validate Environment
        run: |
          if [ "$APP_ENV" != "production" ]; then 
              echo "Wrong environment"
              exit 1
          fi
