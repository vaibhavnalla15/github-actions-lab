name: My First Workflow

on: 
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  

      - name: Check Node version
        run: node -v
      
      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test  
      
      - name: Print System Info
        run: uname -a
